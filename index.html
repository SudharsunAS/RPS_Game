<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RPS Game</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: #fff;
    text-align: center;
}

/* Title */
h1 {
    margin-top: 40px;
    font-size: 42px;
}

/* Buttons */
button {
    background: #fff;
    color: #000;
    border: 2px solid #fff;
    padding: 15px 25px;
    margin: 15px;
    font-size: 18px;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #000;
    color: #fff;
    transform: scale(1.1);
}

button:active {
    transform: scale(0.95);
}

/* Result Box */
#result {
    margin-top: 30px;
    font-size: 22px;
    background: #111;
    display: inline-block;
    padding: 15px 25px;
    border-radius: 10px;
    border: 1px solid #fff;
}

/* Score */
#score {
    margin-top: 20px;
    font-size: 20px;
}

/* Reset Button */
.reset {
    margin-top: 20px;
    background: crimson;
    color: white;
    border: none;
}

</style>
</head>

<body>

<h1>Rock Paper Scissors 🎮</h1>

<button onclick="play('rock')">🪨 Rock</button>
<button onclick="play('paper')">📄 Paper</button>
<button onclick="play('scissors')">✂️ Scissors</button>

<h2 id="result">Make your move!</h2>
<div id="score">You: 0 | Computer: 0</div>

<button class="reset" onclick="resetGame()">Reset Game</button>

<script>
let userScore = 0;
let computerScore = 0;

function play(user) {
    const choices = ['rock', 'paper', 'scissors'];
    const computer = choices[Math.floor(Math.random() * 3)];

    let result = "";

    if (user === computer) {
        result = "Draw 🤝";
    } 
    else if (
        (user === 'rock' && computer === 'scissors') ||
        (user === 'paper' && computer === 'rock') ||
        (user === 'scissors' && computer === 'paper')
    ) {
        result = "You Win 🎉";
        userScore++;
    } 
    else {
        result = "You Lose 😢";
        computerScore++;
    }

    document.getElementById("result").innerText =
        `You: ${user} | Computer: ${computer} → ${result}`;

    document.getElementById("score").innerText =
        `You: ${userScore} | Computer: ${computerScore}`;
}

function resetGame() {
    userScore = 0;
    computerScore = 0;
    document.getElementById("result").innerText = "Game Reset! Start again 🎮";
    document.getElementById("score").innerText = "You: 0 | Computer: 0";
}
</script>

</body>
</html>
